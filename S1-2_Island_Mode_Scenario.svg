<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="510" viewBox="0 0 1040 510">
  <defs>
    <marker id="arrOrange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#cc3d00"/>
    </marker>
    <marker id="arrNavy" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#002060"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1040" height="510" fill="#f8fafb"/>

  <!-- Header bar -->
  <rect x="0" y="0" width="1040" height="50" fill="#002060"/>
  <text x="24" y="31" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#ffffff" letter-spacing="1">S1-2  ·  THE ISLAND MODE SCENARIO</text>
  <rect x="870" y="13" width="154" height="24" rx="12" fill="#1a3660" stroke="#3d7fbd" stroke-width="1"/>
  <text x="947" y="29" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#88aacc" letter-spacing="0.5">SECTION 1  ·  INTRO</text>

  <!-- LEFT DIAGRAM PANEL -->
  <rect x="16" y="58" width="614" height="372" rx="8" fill="#ffffff" stroke="#c8d8e8" stroke-width="1.5"/>
  <text x="323" y="82" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#1a3660" letter-spacing="0.5">SINGLE-LINE DIAGRAM  ·  ISLAND MODE OPERATION</text>

  <!-- DISCONNECTED GRID (right side, greyed out, open switch) -->
  <rect x="408" y="90" width="190" height="88" rx="6" fill="#f0f0f0" stroke="#999999" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="503" y="117" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#999999">UTILITY GRID</text>
  <text x="503" y="135" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#aaaaaa">not connected</text>
  <!-- Open switch: two lines with gap + open circle -->
  <line x1="503" y1="178" x2="503" y2="192" stroke="#999999" stroke-width="2.5"/>
  <line x1="503" y1="204" x2="503" y2="228" stroke="#999999" stroke-width="2.5"/>
  <circle cx="503" cy="192" r="4" fill="#ffffff" stroke="#999999" stroke-width="2"/>
  <circle cx="503" cy="204" r="4" fill="#ffffff" stroke="#999999" stroke-width="2"/>
  <!-- X mark over the disconnected stub -->
  <line x1="491" y1="193" x2="515" y2="213" stroke="#cc3d00" stroke-width="2.5"/>
  <line x1="515" y1="193" x2="491" y2="213" stroke="#cc3d00" stroke-width="2.5"/>

  <!-- BUS BAR -->
  <line x1="58" y1="228" x2="596" y2="228" stroke="#002060" stroke-width="6" stroke-linecap="square"/>
  <text x="232" y="218" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#8899aa" letter-spacing="1">13.8 kV BUS</text>

  <!-- Frequency warning badge -->
  <rect x="414" y="214" width="82" height="20" rx="10" fill="#fff0e8" stroke="#cc3d00" stroke-width="1.5"/>
  <text x="455" y="227" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#cc3d00">f = 60 Hz  CRITICAL</text>

  <!-- GTG upward power arrow -->
  <line x1="130" y1="264" x2="130" y2="232" stroke="#002060" stroke-width="3.5" marker-end="url(#arrNavy)"/>
  <rect x="35" y="233" width="86" height="20" rx="4" fill="#e8f2e8" stroke="#4a8040" stroke-width="1"/>
  <text x="78" y="246" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#244424">Only source</text>

  <!-- GTG GENERATOR circle -->
  <circle cx="130" cy="312" r="48" fill="#f0f5fa" stroke="#002060" stroke-width="2.5"/>
  <path d="M 104 312 Q 113 293, 122 312 Q 131 331, 140 312 Q 149 293, 158 312" fill="none" stroke="#002060" stroke-width="2" stroke-linecap="round"/>
  <text x="130" y="372" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#1a3660">GAS TURBINE GENERATOR</text>

  <!-- LOAD BLOCK -->
  <line x1="300" y1="228" x2="300" y2="270" stroke="#cc3d00" stroke-width="2.5"/>
  <rect x="228" y="270" width="144" height="72" rx="5" fill="#fff4ee" stroke="#cc3d00" stroke-width="2"/>
  <text x="300" y="297" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#8b2000">LOAD EVENT</text>
  <text x="300" y="313" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#7a3010">IT Power Demand</text>
  <text x="300" y="329" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#cc3d00">+ Delta MW  (system event)</text>

  <!-- Heavy orange arrow: load impact hits GTG directly -->
  <path d="M 242 296 C 200 280 170 260 138 242" fill="none" stroke="#cc3d00" stroke-width="3.5" marker-end="url(#arrOrange)"/>
  <text x="184" y="296" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#8b2000" font-weight="bold">full impact</text>

  <!-- MINI MW vs TIME CHART -->
  <rect x="370" y="265" width="246" height="119" rx="6" fill="#f8fafb" stroke="#c8d8e8" stroke-width="1.5"/>
  <text x="493" y="281" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#8b2000">FREQUENCY  vs. TIME</text>

  <!-- Chart inner area -->
  <rect x="384" y="287" width="218" height="72" fill="#ffffff" stroke="#dde8f2" stroke-width="1"/>

  <!-- Load event vertical marker -->
  <line x1="468" y1="287" x2="468" y2="359" stroke="#cc3d00" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="470" y="300" font-family="Arial,sans-serif" font-size="8" fill="#cc3d00">load event</text>

  <!-- 60 Hz reference line -->
  <line x1="384" y1="307" x2="602" y2="307" stroke="#aaaaaa" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="386" y="303" font-family="Arial,sans-serif" font-size="8" fill="#888888">60 Hz</text>

  <!-- Frequency trace: flat 60 Hz, then drops sharply at event, governor recovers -->
  <path d="M 384 307 L 465 307 L 475 343 L 500 322 L 540 310 L 602 308" fill="none" stroke="#cc3d00" stroke-width="2.5"/>

  <!-- Legend -->
  <rect x="386" y="364" width="8" height="8" fill="#cc3d00"/>
  <text x="398" y="372" font-family="Arial,sans-serif" font-size="8" fill="#cc3d00">Bus frequency — drops, governor must recover</text>

  <!-- RIGHT INFO PANEL -->
  <rect x="640" y="58" width="384" height="372" rx="8" fill="#fff8f5" stroke="#e8c8b8" stroke-width="1.5"/>
  <text x="832" y="86" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#8b2000" letter-spacing="0.5">KEY CHARACTERISTICS</text>

  <!-- Card 1: No External Grid -->
  <rect x="658" y="96" width="348" height="70" rx="6" fill="#ffffff" stroke="#f0d0c0" stroke-width="1"/>
  <rect x="658" y="96" width="4" height="70" rx="2" fill="#cc3d00"/>
  <text x="674" y="116" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#8b2000">No External Grid</text>
  <text x="674" y="132" font-family="Arial,sans-serif" font-size="10" fill="#334466">The GTG(s) are the only source of power.</text>
  <text x="674" y="147" font-family="Arial,sans-serif" font-size="10" fill="#334466">There is no utility connection to fall back on.</text>
  <text x="674" y="160" font-family="Arial,sans-serif" font-size="9" fill="#cc3d00">The infinite bus buffer is gone.</text>

  <!-- Card 2: Every Load Change is a System Event -->
  <rect x="658" y="176" width="348" height="70" rx="6" fill="#ffffff" stroke="#f0d0c0" stroke-width="1"/>
  <rect x="658" y="176" width="4" height="70" rx="2" fill="#cc3d00"/>
  <text x="674" y="196" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#8b2000">Every Load Change is a System Event</text>
  <text x="674" y="212" font-family="Arial,sans-serif" font-size="10" fill="#334466">Motor starts, UPS switching, IT load steps —</text>
  <text x="674" y="227" font-family="Arial,sans-serif" font-size="10" fill="#334466">each one hits the GTG(s) with full force.</text>
  <text x="674" y="240" font-family="Arial,sans-serif" font-size="9" fill="#cc3d00">Governor must respond in seconds.</text>

  <!-- Card 3: GTG Controls Frequency and Voltage -->
  <rect x="658" y="256" width="348" height="70" rx="6" fill="#ffffff" stroke="#f0d0c0" stroke-width="1"/>
  <rect x="658" y="256" width="4" height="70" rx="2" fill="#e06828"/>
  <text x="674" y="276" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#8b2000">GTG Controls Frequency and Voltage</text>
  <text x="674" y="292" font-family="Arial,sans-serif" font-size="10" fill="#334466">Gas turbine governor holds frequency.</text>
  <text x="674" y="307" font-family="Arial,sans-serif" font-size="10" fill="#334466">Alternator excitation system holds voltage.</text>
  <text x="674" y="320" font-family="Arial,sans-serif" font-size="9" fill="#e06828">There is nothing else.</text>

  <!-- Card 4: Reactive Power from Alternator Only -->
  <rect x="658" y="336" width="348" height="70" rx="6" fill="#ffffff" stroke="#f0d0c0" stroke-width="1"/>
  <rect x="658" y="336" width="4" height="70" rx="2" fill="#e06828"/>
  <text x="674" y="356" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#8b2000">Reactive Power from On-Site Alternator</text>
  <text x="674" y="372" font-family="Arial,sans-serif" font-size="10" fill="#334466">All reactive demand (motors, PF, voltage)</text>
  <text x="674" y="387" font-family="Arial,sans-serif" font-size="10" fill="#334466">must come from the on-site alternator(s).</text>
  <text x="674" y="400" font-family="Arial,sans-serif" font-size="9" fill="#e06828">Reactive loading directly limits real power.</text>

  <!-- BOTTOM CALLOUT -->
  <rect x="16" y="438" width="1008" height="62" rx="7" fill="#fff4ee" stroke="#e8c0a8" stroke-width="1"/>
  <rect x="16" y="438" width="4" height="62" rx="2" fill="#cc3d00"/>
  <text x="34" y="463" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#8b2000">KEY CONCEPT</text>
  <text x="34" y="479" font-family="Arial,sans-serif" font-size="11" fill="#334466">In island mode, every load change is a system-level event. The gas turbine controls frequency. The alternator controls voltage.</text>
  <text x="34" y="494" font-family="Arial,sans-serif" font-size="11" fill="#334466">There is no grid to absorb transients — the GTG must handle everything alone, in real time.</text>

  <!-- Branding -->
  <text x="1024" y="504" text-anchor="end" font-family="Arial,sans-serif" font-size="8" fill="#aaa">Kirby Industrial Resources</text>
</svg>