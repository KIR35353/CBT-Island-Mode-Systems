<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1040 510" width="1040" height="510"
     font-family="'Segoe UI', Arial, Helvetica, sans-serif">

  <!--
    ANGLE MAPPING (SVG: 0°=right/3-o'clock, CW-positive, y-down)
      8 o'clock = 150°,  12 o'clock = 270°,  4 o'clock = 30°
    Formula: angle = 150 + pct × 2.4°
      0%  → 150°  (8 o'clock)
     25%  → 210°  (10 o'clock)
     50%  → 270°  (12 o'clock)
     75%  → 330°  ← ISLAND MODE LIMIT (after both derates)
     88%  → 361.2° = 1.2°  ← TEMP. DERATE LEVEL (12% below ISO)
    100%  → 30°   (4 o'clock)

    TWO-DERATE STACK (18 MW ISO):
      ISO base:          18.0 MW  = 100%
      After temp −12%:   15.8 MW  = 88%
      After island −15%: 13.5 MW  = 75%  ← needle rests here

    COLOUR BANDS:
      Green  0–75%:  150° → 330°  CW span=180°  large-arc=1
      Amber 75–88%:  330° → 1.2°  CW span=31.2° large-arc=0
      Red   88–100%: 1.2° → 30°   CW span=28.8° large-arc=0

    Arc r_mid=178, stroke-width=22.

    Endpoints (r=178):
      150°: cos=-0.8660, sin= 0.5000 → (365.9, 369.0)
      330°: cos= 0.8660, sin=-0.5000 → (674.1, 191.0)
      1.2°: cos= 0.9998, sin= 0.0209 → (698.0, 283.7)
       30°: cos= 0.8660, sin= 0.5000 → (674.1, 369.0)
  -->

  <defs>
    <!-- CCW arrowhead for amber derate band -->
    <marker id="arr_amber" markerUnits="userSpaceOnUse"
            markerWidth="16" markerHeight="14"
            refX="14" refY="7" orient="auto">
      <path d="M 0,1 L 14,7 L 0,13 Z" fill="#002060"/>
    </marker>
    <!-- CCW arrowhead for red derate band -->
    <marker id="arr_red" markerUnits="userSpaceOnUse"
            markerWidth="16" markerHeight="14"
            refX="14" refY="7" orient="auto">
      <path d="M 0,1 L 14,7 L 0,13 Z" fill="#002060"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1040" height="510" fill="#f4f6f9"/>

  <!-- Meter face -->
  <circle cx="520" cy="280" r="200" fill="#002060"/>

  <!-- ── COLOUR ZONE ARCS (r=178, stroke-width=22) ── -->

  <!-- GREEN: 150° → 330° CW, 180°, large-arc=1 -->
  <path d="M 365.9,369.0 A 178,178 0 1 1 674.1,191.0"
        fill="none" stroke="#00a651" stroke-width="22" stroke-linecap="butt"/>

  <!-- AMBER: 330° → 1.2° CW, 31.2°, large-arc=0 -->
  <path d="M 674.1,191.0 A 178,178 0 0 1 698.0,283.7"
        fill="none" stroke="white" stroke-width="22" stroke-linecap="butt"/>

  <!-- RED: 1.2° → 30° CW, 28.8°, large-arc=0 -->
  <path d="M 698.0,283.7 A 178,178 0 0 1 674.1,369.0"
        fill="none" stroke="white" stroke-width="22" stroke-linecap="butt"/>

  <!-- Inner mask — restores navy face interior -->
  <circle cx="520" cy="280" r="166" fill="#002060"/>

  <!-- ── CCW ARROW ARCS within derate bands ── -->
  <!--
    Amber band center 345.6°: arrow CCW from 354.6° to 336.6°
      354.6°: cos=0.99558, sin=-0.09411 → (697.2, 263.3)
      336.6°: cos=0.91706, sin=-0.39875 → (683.2, 209.0)
    Red band center 15.6°: arrow CCW from 23.6° to 7.6°
      23.6°:  cos=0.91706, sin= 0.39875 → (683.2, 351.0)
       7.6°:  cos=0.99122, sin= 0.13226 → (696.4, 303.5)
  -->
  <path d="M 697.2,263.3 A 178,178 0 0 0 683.2,209.0"
        fill="none" stroke="#002060" stroke-width="1.5"
        marker-end="url(#arr_amber)"/>
  <path d="M 683.2,351.0 A 178,178 0 0 0 696.4,303.5"
        fill="none" stroke="#002060" stroke-width="1.5"
        marker-end="url(#arr_red)"/>

  <!-- ── TICK MARKS (every 10%, r=154–168) ── -->
  <!--
     0%  150°   10%  174°   20%  198°   30%  222°   40%  246°
    50%  270°   60%  294°   70%  318°   80%  342°   90°    6°   100%  30°
  -->
  <g stroke="white" stroke-linecap="round" stroke-width="2">
    <!-- 0%  150° --> <line x1="374.5" y1="364.0" x2="386.6" y2="357.0"/>
    <!-- 10% 174° --> <line x1="352.9" y1="297.6" x2="366.8" y2="296.1"/>
    <!-- 20% 198° --> <line x1="360.2" y1="228.1" x2="373.5" y2="232.4"/>
    <!-- 30% 222° --> <line x1="395.2" y1="167.6" x2="405.6" y2="177.0"/>
    <!-- 40% 246° --> <line x1="451.7" y1="126.5" x2="457.4" y2="139.3"/>
    <!-- 50% 270° --> <line x1="520.0" y1="112.0" x2="520.0" y2="126.0"/>
    <!-- 60% 294° --> <line x1="588.3" y1="126.5" x2="582.6" y2="139.3"/>
    <!-- 70% 318° --> <line x1="644.8" y1="167.6" x2="634.4" y2="177.0"/>
    <!-- 80% 342° --> <line x1="679.8" y1="228.1" x2="666.5" y2="232.4"/>
    <!-- 90%   6° --> <line x1="687.1" y1="297.6" x2="673.2" y2="296.1"/>
    <!-- 100%  30° --> <line x1="665.5" y1="364.0" x2="653.4" y2="357.0"/>
  </g>

  <!-- ── TICK LABELS (every 10%, r=136) ── -->
  <text x="402" y="348" fill="white" font-size="9.5" text-anchor="end"    dominant-baseline="central">0%</text>
  <text x="385" y="294" fill="white" font-size="9.5" text-anchor="end"    dominant-baseline="central">10%</text>
  <text x="391" y="238" fill="white" font-size="9.5" text-anchor="end"    dominant-baseline="central">20%</text>
  <text x="419" y="189" fill="white" font-size="9.5" text-anchor="end"    dominant-baseline="central">30%</text>
  <text x="465" y="156" fill="white" font-size="9.5" text-anchor="middle" dominant-baseline="central">40%</text>
  <text x="520" y="144" fill="white" font-size="9.5" text-anchor="middle" dominant-baseline="central">50%</text>
  <text x="575" y="156" fill="white" font-size="9.5" text-anchor="middle" dominant-baseline="central">60%</text>
  <text x="621" y="189" fill="white" font-size="9.5" text-anchor="start"  dominant-baseline="central">70%</text>
  <text x="649" y="238" fill="white" font-size="9.5" text-anchor="start"  dominant-baseline="central">80%</text>
  <text x="655" y="294" fill="white" font-size="9.5" text-anchor="start"  dominant-baseline="central">90%</text>
  <text x="638" y="348" fill="white" font-size="9.5" text-anchor="start"  dominant-baseline="central">100%</text>

  <!-- ── DASHED CEILING LINES ── -->

  <!-- Line 1: ISLAND MODE LIMIT at 75% (330°)
       cos330=0.8660, sin330=-0.5000
       r=154: x=520+154*0.8660=653.4, y=280+154*(-0.5)=203.0
       r=202: x=520+202*0.8660=694.9, y=280+202*(-0.5)=179.0
  -->
  <line x1="653.4" y1="203.0" x2="694.9" y2="179.0"
        stroke="#00a651" stroke-width="2" stroke-dasharray="7 4"/>
  <text x="700" y="175" fill="#00a651" font-size="10.5" font-weight="700">ISLAND LIMIT — 75%</text>
  <text x="700" y="187" fill="#00a651" font-size="10">(13.5 MW after both derates)</text>

  <!-- Line 2: TEMP. DERATE LEVEL at 88% (1.2°)
       cos1.2=0.9998, sin1.2=0.0209
       r=154: x=520+154*0.9998=674.0, y=280+154*0.0209=283.2
       r=202: x=520+202*0.9998=722.0, y=280+202*0.0209=284.2
  -->
  <text x="727" y="279" fill="#002060" font-size="10.5" font-weight="700">TEMPERATURE DERATE — EXAMPLE 88% AT 33°C</text>
  <text x="727" y="291" fill="#002060" font-size="10">(15.8 MW after −12% derate)</text>

  <!-- ── NEEDLE ──
       Defined pointing right (+x), pivot (520,280).
       Tip at r=152 → x2=672, y2=280 (before rotation).
       Start: 100% = 30° (ISO base / 4 o'clock)
       End:    74% = 327.6° (operating point inside green, just below island limit)
       Sweeps CCW from 30° → 327.6° (decreasing angle by 62.4°)
  -->
  <line x1="520" y1="280" x2="672" y2="280"
        stroke="white" stroke-width="3.5" stroke-linecap="round">
    <animateTransform attributeName="transform"
                      type="rotate"
                      from="30 520 280"
                      to="327.6 520 280"
                      dur="1.8s"
                      begin="0.5s"
                      fill="freeze"
                      calcMode="spline"
                      keySplines="0.25 0.1 0.25 1.0"
                      keyTimes="0;1"/>
  </line>
  <circle cx="520" cy="280" r="7"   fill="white"/>
  <circle cx="520" cy="280" r="3.5" fill="#002060"/>

  <!-- ── ISO BASE RATING label at 100% (30°) ──
       Circle edge at 30°, r=200: (693.2, 380.0)
       Text offset: x+7, y-5 — mirrors ISLAND LIMIT gap at 330°
  -->
  <text x="704" y="375" fill="#002060" font-size="10.5" font-weight="700">ISO BASE RATING — 100%</text>
  <text x="704" y="387" fill="#002060" font-size="10">18 MW</text>

  <!-- Outer ring -->
  <circle cx="520" cy="280" r="200" fill="none" stroke="#1a3a7a" stroke-width="3"/>

  <!-- ══════════════════════════════════════
       ANNOTATION CALLOUT BOXES  y=392–458
       ══════════════════════════════════════ -->

  <!-- Left: ISO Base Rating -->
  <rect x="28"  y="392" width="460" height="72" rx="4" fill="white" stroke="#dde3ea" stroke-width="1"/>
  <rect x="28"  y="392" width="3"   height="72" rx="1" fill="#002060"/>
  <text x="41"  y="409" fill="#002060" font-size="12" font-weight="700">ISO BASE RATING — THE STARTING POINT</text>
  <text x="41"  y="425" fill="#555"    font-size="11">Rated output under ISO 3977 standard conditions —</text>
  <text x="41"  y="440" fill="#555"    font-size="11">a common reference point for like-for-like comparisons</text>
  <text x="41"  y="455" fill="#555"    font-size="11">across manufacturers, sites, and ambient environments.</text>

  <!-- Right: Island Mode Ceiling -->
  <rect x="552" y="392" width="460" height="72" rx="4" fill="white" stroke="#dde3ea" stroke-width="1"/>
  <rect x="552" y="392" width="3"   height="72" rx="1" fill="#cc3d00"/>
  <text x="565" y="409" fill="#cc3d00" font-size="12" font-weight="700">ISLAND MODE CEILING — WHY THE NEEDLE STOPS HERE</text>
  <text x="565" y="425" fill="#555"    font-size="11">Two stacked derates — temperature −12% then island mode −15% —</text>
  <text x="565" y="440" fill="#555"    font-size="11">reduce usable output to 75% of ISO nameplate rating.</text>
  <text x="565" y="455" fill="#555"    font-size="11">This section explains both derates and how they combine.</text>

  <!-- ══════════════════════════════════════
       ROADMAP STRIP  y=464–510
       ══════════════════════════════════════ -->
  <rect x="0" y="464" width="1040" height="46" fill="#002060"/>
  <text x="16" y="491" fill="white" font-size="10" font-weight="600" letter-spacing="0.5">THIS SECTION COVERS:</text>

  <rect x="163" y="473" width="118" height="20" rx="10" fill="#1a3a7a"/>
  <text x="222" y="487" fill="white" font-size="9.5" text-anchor="middle">ISO Base Rating</text>
  <text x="287" y="488" fill="#cc3d00" font-size="15" font-weight="700">›</text>

  <rect x="297" y="473" width="130" height="20" rx="10" fill="#1a3a7a"/>
  <text x="362" y="487" fill="white" font-size="9.5" text-anchor="middle">Temperature Derate</text>
  <text x="433" y="488" fill="#cc3d00" font-size="15" font-weight="700">›</text>

  <rect x="443" y="473" width="130" height="20" rx="10" fill="#1a3a7a"/>
  <text x="508" y="487" fill="white" font-size="9.5" text-anchor="middle">Island Mode Derate</text>
  <text x="579" y="488" fill="#cc3d00" font-size="15" font-weight="700">›</text>

  <rect x="589" y="473" width="188" height="20" rx="10" fill="#1a3a7a"/>
  <text x="683" y="487" fill="white" font-size="9.5" text-anchor="middle">Incremental Reserve Margin (IRM)</text>
  <text x="783" y="488" fill="#cc3d00" font-size="15" font-weight="700">›</text>

  <rect x="793" y="473" width="155" height="20" rx="10" fill="#1a3a7a"/>
  <text x="870" y="487" fill="white" font-size="9.5" text-anchor="middle">Alternator MVA Sizing</text>

</svg>
