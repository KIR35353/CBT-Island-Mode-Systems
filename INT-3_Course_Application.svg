<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     viewBox="0 0 960 520" width="960" height="520"
     font-family="'Segoe UI', Arial, Helvetica, sans-serif">

  <!-- ── Background ── -->
  <rect width="960" height="520" fill="#f3f5f9"/>
  <rect x="0" y="0" width="960" height="5" fill="#1a3660"/>
  <rect x="0" y="515" width="960" height="5" fill="#1a3660"/>

  <!-- ── Title ── -->
  <text x="480" y="30" text-anchor="middle" font-size="20" font-weight="700" fill="#1a3660">Course Application — Reference Single-Line Diagram</text>
  <text x="480" y="50" text-anchor="middle" font-size="12" fill="#555">Multi-unit paralleled GTG power system · Data center island mode · No utility grid connection</text>
  <line x1="260" y1="58" x2="700" y2="58" stroke="#3068b0" stroke-width="1" opacity="0.4"/>

  <!-- ══════════════════════════════════════════════════════════
       GENERATOR FEEDER LINES (from circle bottoms down to bus)
  ══════════════════════════════════════════════════════════════ -->

  <!-- GTG-1 cx=175 -->
  <line x1="175" y1="146" x2="175" y2="184" stroke="#1a3660" stroke-width="2"/>
  <rect  x="169" y="184" width="12" height="12" fill="#1a3660"/><!-- breaker -->
  <line x1="175" y1="196" x2="175" y2="237" stroke="#1a3660" stroke-width="2"/>

  <!-- GTG-2 cx=368 -->
  <line x1="368" y1="146" x2="368" y2="184" stroke="#1a3660" stroke-width="2"/>
  <rect  x="362" y="184" width="12" height="12" fill="#1a3660"/>
  <line x1="368" y1="196" x2="368" y2="237" stroke="#1a3660" stroke-width="2"/>

  <!-- GTG-3 cx=592 -->
  <line x1="592" y1="146" x2="592" y2="184" stroke="#1a3660" stroke-width="2"/>
  <rect  x="586" y="184" width="12" height="12" fill="#1a3660"/>
  <line x1="592" y1="196" x2="592" y2="237" stroke="#1a3660" stroke-width="2"/>

  <!-- GTG-4 cx=785 -->
  <line x1="785" y1="146" x2="785" y2="184" stroke="#1a3660" stroke-width="2"/>
  <rect  x="779" y="184" width="12" height="12" fill="#1a3660"/>
  <line x1="785" y1="196" x2="785" y2="237" stroke="#1a3660" stroke-width="2"/>

  <!-- Power-flow arrows (downward on feeders) -->
  <polygon points="175,234 171,224 179,224" fill="#3068b0" opacity="0.7"/>
  <polygon points="368,234 364,224 372,224" fill="#3068b0" opacity="0.7"/>
  <polygon points="592,234 588,224 596,224" fill="#3068b0" opacity="0.7"/>
  <polygon points="785,234 781,224 789,224" fill="#3068b0" opacity="0.7"/>

  <!-- ══════════════════════════════════════════════════════════
       GENERATOR CIRCLES  (cy=115, r=30)
  ══════════════════════════════════════════════════════════════ -->

  <!-- GTG-1 -->
  <circle cx="175" cy="115" r="30" fill="#1a3660" stroke="#3068b0" stroke-width="2"/>
  <path d="M161,115 Q168,106 175,115 Q182,124 189,115" fill="none" stroke="#80b8e8" stroke-width="2.2" stroke-linecap="round"/>

  <!-- GTG-2 -->
  <circle cx="368" cy="115" r="30" fill="#1a3660" stroke="#3068b0" stroke-width="2"/>
  <path d="M354,115 Q361,106 368,115 Q375,124 382,115" fill="none" stroke="#80b8e8" stroke-width="2.2" stroke-linecap="round"/>

  <!-- GTG-3 -->
  <circle cx="592" cy="115" r="30" fill="#1a3660" stroke="#3068b0" stroke-width="2"/>
  <path d="M578,115 Q585,106 592,115 Q599,124 606,115" fill="none" stroke="#80b8e8" stroke-width="2.2" stroke-linecap="round"/>

  <!-- GTG-4 -->
  <circle cx="785" cy="115" r="30" fill="#1a3660" stroke="#3068b0" stroke-width="2"/>
  <path d="M771,115 Q778,106 785,115 Q792,124 799,115" fill="none" stroke="#80b8e8" stroke-width="2.2" stroke-linecap="round"/>

  <!-- Generator name labels -->
  <text x="175" y="162" text-anchor="middle" font-size="11" font-weight="700" fill="#1a3660">GTG-1</text>
  <text x="175" y="174" text-anchor="middle" font-size="9"  fill="#556">18 MW Class</text>

  <text x="368" y="162" text-anchor="middle" font-size="11" font-weight="700" fill="#1a3660">GTG-2</text>
  <text x="368" y="174" text-anchor="middle" font-size="9"  fill="#556">18 MW Class</text>

  <text x="592" y="162" text-anchor="middle" font-size="11" font-weight="700" fill="#1a3660">GTG-3</text>
  <text x="592" y="174" text-anchor="middle" font-size="9"  fill="#556">18 MW Class</text>

  <text x="785" y="162" text-anchor="middle" font-size="11" font-weight="700" fill="#1a3660">GTG-4</text>
  <text x="785" y="174" text-anchor="middle" font-size="9"  fill="#556">18 MW Class</text>

  <!-- ══════════════════════════════════════════════════════════
       MAIN BUS
  ══════════════════════════════════════════════════════════════ -->

  <!-- Bus bar: x=115 to x=870, y=237 -->
  <line x1="115" y1="237" x2="870" y2="237" stroke="#1a3660" stroke-width="5" stroke-linecap="square"/>
  <!-- Bus label (centered above the bar, between GTG-2 and GTG-3) -->
  <text x="480" y="226" text-anchor="middle" font-size="11" font-weight="700" fill="#2e5f9e" letter-spacing="1">ISLAND BUS · 60 Hz</text>

  <!-- ── No Utility indicator (left of bus) ── -->
  <!-- Dashed red stub going left from bus   -->
  <line x1="35" y1="237" x2="112" y2="237" stroke="#c0392b" stroke-width="1.5" stroke-dasharray="5,3"/>
  <!-- Open terminal dot -->
  <circle cx="35" cy="237" r="5" fill="white" stroke="#c0392b" stroke-width="2"/>
  <!-- Open switch tick (contact open) -->
  <line x1="62" y1="237" x2="72" y2="228" stroke="#c0392b" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="62" cy="237" r="3" fill="white" stroke="#c0392b" stroke-width="1.5"/>
  <!-- Label above and below the stub -->
  <text x="72" y="222" text-anchor="middle" font-size="9" font-weight="700" fill="#c0392b">UTILITY GRID</text>
  <text x="72" y="251" text-anchor="middle" font-size="9" fill="#c0392b" font-style="italic">(not connected)</text>

  <!-- ══════════════════════════════════════════════════════════
       LOAD FEEDER → DATA CENTER
  ══════════════════════════════════════════════════════════════ -->

  <!-- Line down from bus center -->
  <line x1="480" y1="237" x2="480" y2="270" stroke="#1a3660" stroke-width="2"/>
  <!-- Distribution breaker -->
  <rect x="474" y="270" width="12" height="12" fill="#1a3660"/>
  <!-- Continue to data center -->
  <line x1="480" y1="282" x2="480" y2="308" stroke="#1a3660" stroke-width="2"/>
  <!-- Power flow arrow (downward) -->
  <polygon points="480,306 476,296 484,296" fill="#3068b0" opacity="0.7"/>

  <!-- Data Center block -->
  <rect x="340" y="308" width="280" height="88" rx="10" fill="#1a3660" stroke="#0f2240" stroke-width="2"/>
  <!-- Header accent band (rounded top) -->
  <rect x="340" y="308" width="280" height="40" rx="10" fill="#2e5f9e"/>
  <rect x="340" y="334" width="280" height="14" fill="#2e5f9e"/>
  <!-- Server rack icons in header -->
  <rect x="358" y="314" width="18" height="26" rx="2" fill="#1a3660"/>
  <rect x="360" y="317" width="14" height="3" rx="1" fill="#80b8e8"/>
  <rect x="360" y="322" width="14" height="3" rx="1" fill="#80b8e8"/>
  <rect x="360" y="327" width="14" height="3" rx="1" fill="#80b8e8"/>
  <rect x="381" y="314" width="18" height="26" rx="2" fill="#1a3660"/>
  <rect x="383" y="317" width="14" height="3" rx="1" fill="#80b8e8"/>
  <rect x="383" y="322" width="14" height="3" rx="1" fill="#80b8e8"/>
  <rect x="383" y="327" width="14" height="3" rx="1" fill="#80b8e8"/>
  <!-- Data center labels -->
  <text x="480" y="361" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">DATA CENTER</text>
  <text x="480" y="379" text-anchor="middle" font-size="10" fill="#a4c8e8">Critical IT Load — All power supplied by on-site GTGs</text>

  <!-- ══════════════════════════════════════════════════════════
       CALLOUT BAR
  ══════════════════════════════════════════════════════════════ -->

  <rect x="40" y="418" width="880" height="58" rx="8" fill="#dce7f5" stroke="#bed0e8" stroke-width="1"/>
  <rect x="40" y="418" width="5"   height="58" rx="4" fill="#2e5f9e"/>

  <!-- Left callout item -->
  <circle cx="72" cy="439" r="5.5" fill="#1a3660"/>
  <text x="84" y="443" font-size="11" font-weight="700" fill="#1a3660">Application Focus:</text>
  <text x="84" y="458" font-size="11" fill="#334">Multi-unit paralleled GTG power systems for data centers</text>

  <!-- Right callout item -->
  <circle cx="490" cy="439" r="5.5" fill="#c0392b"/>
  <text x="502" y="443" font-size="11" font-weight="700" fill="#c0392b">No utility grid connection —</text>
  <text x="502" y="458" font-size="11" fill="#c0392b">the GTGs are the grid</text>

  <!-- ── Supplier footnote ── -->
  <text x="480" y="491" text-anchor="middle" font-size="9" fill="#888" font-style="italic">
    Supplier examples used in this course: Kawasaki Heavy Industries (KHI) turbines · Jeumont Electric alternators
  </text>

  <!-- ── Kirby branding ── -->
  <image href="kirbyflag_imagefile.png" xlink:href="kirbyflag_imagefile.png"
         x="852" y="427" width="60" height="28"
         opacity="0.45" preserveAspectRatio="xMidYMid meet"/>
  <text x="853" y="463" font-size="8" fill="#bbb">Kirby Industrial Resources</text>

</svg>
