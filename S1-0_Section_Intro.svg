<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 1040 510" width="1040" height="510"
     font-family="Arial, Helvetica, sans-serif">

  <defs>
    <marker id="arr-blue" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0,0 9,3.5 0,7" fill="#3d7fbd"/>
    </marker>
    <marker id="arr-orange" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0,0 9,3.5 0,7" fill="#cc3d00"/>
    </marker>
  </defs>

  <!-- BACKGROUND -->
  <rect x="0" y="0" width="1040" height="510" fill="#f0f4f9"/>
  <rect x="0" y="0" width="1040" height="4" fill="#1a3660"/>
  <rect x="0" y="506" width="1040" height="4" fill="#1a3660"/>

  <!-- PANELS -->
  <rect x="8" y="8" width="502" height="494" rx="8" fill="#ffffff" stroke="#c8d8e8" stroke-width="1.2"/>
  <rect x="530" y="8" width="502" height="494" rx="8" fill="#ffffff" stroke="#c8d8e8" stroke-width="1.2"/>

  <!-- LEFT HEADER -->
  <rect x="8" y="8" width="502" height="46" rx="8" fill="#1a3660"/>
  <rect x="8" y="30" width="502" height="24" fill="#1a3660"/>
  <text x="259" y="36" text-anchor="middle" font-size="13" font-weight="bold" fill="#ffffff" letter-spacing="1.2">GRID-CONNECTED OPERATION</text>

  <!-- RIGHT HEADER -->
  <rect x="530" y="8" width="502" height="46" rx="8" fill="#1a3660"/>
  <rect x="530" y="30" width="502" height="24" fill="#1a3660"/>
  <text x="781" y="36" text-anchor="middle" font-size="13" font-weight="bold" fill="#ffffff" letter-spacing="1.2">ISLAND MODE OPERATION</text>

  <!-- VS BADGE -->
  <circle cx="520" cy="177" r="20" fill="#1a3660" stroke="#f0f4f9" stroke-width="3"/>
  <text x="520" y="182" text-anchor="middle" font-size="11" font-weight="bold" fill="#ffffff">VS</text>

  <!-- ============ LEFT SIDE ============ -->

  <!-- Load step block (cx=259, cy=182) -->
  <rect x="199" y="78" width="120" height="52" rx="6" fill="#edf3fa" stroke="#3d7fbd" stroke-width="1.5"/>
  <text x="259" y="96" text-anchor="middle" font-size="11" font-weight="bold" fill="#1a3660">LOAD STEP</text>
  <text x="259" y="112" text-anchor="middle" font-size="13" font-weight="bold" fill="#3d7fbd">+5 MW</text>

  <!-- Drop line from step load to bus -->
  <line x1="259" y1="130" x2="259" y2="222" stroke="#3d7fbd" stroke-width="1.2" stroke-dasharray="4,3"/>

  <!-- Arrow: from utility junction, left then up to load step box -->
  <path d="M359,212 L279,212 Q269,212 269,202 L269,130" fill="none" stroke="#3d7fbd" stroke-width="2"
        marker-end="url(#arr-blue)"/>

  <!-- GTG circle -->
  <circle cx="100" cy="104" r="40" fill="#f5f8fc" stroke="#1a3660" stroke-width="2"/>
  <path d="M79,104 Q87,90 95,104 Q103,118 111,104 Q119,90 121,104"
        fill="none" stroke="#1a3660" stroke-width="2.2" stroke-linecap="round"/>
  <text x="100" y="162" text-anchor="middle" font-size="11" font-weight="bold" fill="#1a3660">GTG</text>

  <!-- Feeder -->
  <line x1="100" y1="144" x2="100" y2="200" stroke="#1a3660" stroke-width="2"/>
  <rect x="93" y="200" width="14" height="14" rx="2" fill="#1a3660"/>
  <line x1="100" y1="214" x2="100" y2="222" stroke="#1a3660" stroke-width="2"/>

  <!-- Bus -->
  <line x1="60" y1="222" x2="440" y2="222" stroke="#1a3660" stroke-width="4.5" stroke-linecap="square"/>
  <text x="130" y="213" font-size="9" font-weight="bold" fill="#6a7d94">BUS</text>

  <!-- Load feeder -->
  <line x1="100" y1="222" x2="100" y2="264" stroke="#1a3660" stroke-width="2"/>
  <rect x="93" y="264" width="14" height="14" rx="2" fill="#3d7fbd"/>
  <line x1="100" y1="278" x2="100" y2="288" stroke="#1a3660" stroke-width="2"/>
  <rect x="38" y="288" width="124" height="44" rx="6" fill="#edf3fa" stroke="#3d7fbd" stroke-width="1.5"/>
  <text x="100" y="307" text-anchor="middle" font-size="10" font-weight="bold" fill="#1a3660">DATA CENTRE</text>

  <!-- Grid connection line -->
  <line x1="440" y1="222" x2="440" y2="174" stroke="#1a3660" stroke-width="2"/>
  <line x1="440" y1="174" x2="458" y2="174" stroke="#1a3660" stroke-width="2"/>

  <!-- Utility grid symbol -->
  <line x1="458" y1="142" x2="458" y2="200" stroke="#1a3660" stroke-width="2.2"/>
  <line x1="458" y1="146" x2="496" y2="146" stroke="#1a3660" stroke-width="2.2"/>
  <line x1="458" y1="162" x2="490" y2="162" stroke="#1a3660" stroke-width="2"/>
  <line x1="458" y1="178" x2="480" y2="178" stroke="#1a3660" stroke-width="1.8"/>
  <line x1="458" y1="194" x2="470" y2="194" stroke="#1a3660" stroke-width="1.5"/>
  <line x1="458" y1="200" x2="458" y2="206" stroke="#1a3660" stroke-width="2.2"/>
  <line x1="451" y1="206" x2="465" y2="206" stroke="#1a3660" stroke-width="1.8"/>
  <text x="480" y="132" text-anchor="middle" font-size="10" font-weight="bold" fill="#1a3660">UTILITY GRID</text>

  <!-- Infinite bus pill -->
  <rect x="416" y="228" width="90" height="20" rx="10" fill="#dce7f5" stroke="#3d7fbd" stroke-width="1"/>
  <text x="461" y="242" text-anchor="middle" font-size="10" font-weight="bold" fill="#1a3660">inf.  Infinite Bus</text>

  <!-- Left callout bar -->
  <rect x="18" y="350" width="482" height="66" rx="7" fill="#edf3fa" stroke="#c2d4e8" stroke-width="1"/>
  <rect x="18" y="350" width="4" height="66" rx="3" fill="#3d7fbd"/>
  <text x="32" y="371" font-size="11" font-weight="bold" fill="#1a3660">Load step absorbed by the utility grid - GTG output barely changes</text>
  <text x="32" y="387" font-size="11" fill="#3a5270">Grid holds frequency and voltage. Supplies reactive power. GTG sees only a fraction.</text>
  <text x="32" y="403" font-size="11" fill="#3a5270">Governor response time: minutes. DLE combustion: low transient risk.</text>

  <!-- ============ RIGHT SIDE ============ -->

  <!-- Load step block (same scenario) (cx=781, cy=182) -->
  <rect x="721" y="78" width="120" height="52" rx="6" fill="#fff4ee" stroke="#cc3d00" stroke-width="1.5"/>
  <text x="781" y="96" text-anchor="middle" font-size="11" font-weight="bold" fill="#8b2000">LOAD STEP</text>
  <text x="781" y="112" text-anchor="middle" font-size="13" font-weight="bold" fill="#cc3d00">+5 MW</text>

  <!-- Drop line from step load to bus -->
  <line x1="781" y1="130" x2="781" y2="222" stroke="#cc3d00" stroke-width="1.2" stroke-dasharray="4,3"/>

  <!-- Arrow: from GTG, right then up to load step box -->
  <path d="M681,212 L761,212 Q771,212 771,202 L771,130" fill="none" stroke="#cc3d00" stroke-width="2"
        marker-end="url(#arr-orange)"/>

  <!-- GTG circle -->
  <circle cx="622" cy="104" r="40" fill="#fff8f5" stroke="#cc3d00" stroke-width="2.2"/>
  <path d="M601,104 Q609,90 617,104 Q625,118 633,104 Q641,90 643,104"
        fill="none" stroke="#cc3d00" stroke-width="2.2" stroke-linecap="round"/>
  <text x="622" y="162" text-anchor="middle" font-size="11" font-weight="bold" fill="#cc3d00">GTG</text>

  <!-- Feeder -->
  <line x1="622" y1="144" x2="622" y2="200" stroke="#cc3d00" stroke-width="2.2"/>
  <rect x="615" y="200" width="14" height="14" rx="2" fill="#cc3d00"/>
  <line x1="622" y1="214" x2="622" y2="222" stroke="#cc3d00" stroke-width="2.2"/>

  <!-- Island bus -->
  <line x1="582" y1="222" x2="858" y2="222" stroke="#cc3d00" stroke-width="4.5" stroke-linecap="square"/>
  <text x="652" y="213" font-size="9" font-weight="bold" fill="#cc3d00">BUS</text>

  <!-- Open circuit at right end - no grid -->
  <line x1="858" y1="222" x2="888" y2="222" stroke="#bbb" stroke-width="1.8" stroke-dasharray="4,3"/>
  <circle cx="858" cy="222" r="4" fill="white" stroke="#bbb" stroke-width="1.5"/>
  <line x1="858" y1="222" x2="871" y2="210" stroke="#bbb" stroke-width="1.8" stroke-linecap="round"/>
  <text x="895" y="218" font-size="9" fill="#999">utility</text>
  <text x="895" y="232" font-size="9" fill="#cc3d00">disconnected</text>

  <!-- Load feeder -->
  <line x1="622" y1="222" x2="622" y2="264" stroke="#cc3d00" stroke-width="2"/>
  <rect x="615" y="264" width="14" height="14" rx="2" fill="#3d7fbd"/>
  <line x1="622" y1="278" x2="622" y2="288" stroke="#1a3660" stroke-width="2"/>
  <rect x="560" y="288" width="124" height="44" rx="6" fill="#fff4ee" stroke="#cc3d00" stroke-width="1.5"/>
  <text x="622" y="307" text-anchor="middle" font-size="10" font-weight="bold" fill="#8b2000">DATA CENTRE</text>

  <!-- Right callout bar -->
  <rect x="540" y="350" width="482" height="66" rx="7" fill="#fff4ee" stroke="#e8c0a8" stroke-width="1"/>
  <rect x="540" y="350" width="4" height="66" rx="3" fill="#cc3d00"/>
  <text x="554" y="369" font-size="11" fill="#6b3020">Frequency deviation is immediate. Governor must respond within 1-2 seconds.</text>
  <text x="554" y="383" font-size="11" fill="#6b3020">No reactive power buffer. DLE combustion system must survive the transient.</text>
  <text x="554" y="397" font-size="11" fill="#6b3020">Alternator terminal voltage dips — AVR must restore reactive output before protection trips.</text>

  <!-- SECTION TAG -->
  <rect x="454" y="10" width="132" height="24" rx="12" fill="#f0f4f9" stroke="#c8d8e8" stroke-width="1"/>
  <text x="520" y="26" text-anchor="middle" font-size="10" font-weight="bold" fill="#1a3660">SECTION 1  -  INTRO</text>

  <!-- TWO PERSPECTIVES BAND -->
  <rect x="18" y="426" width="1004" height="70" rx="7" fill="#f0f4f9" stroke="#c8d8e8" stroke-width="1"/>
  <rect x="18" y="426" width="4" height="70" rx="3" fill="#1a3660"/>
  <text x="32" y="444" font-size="11" font-weight="bold" fill="#1a3660">Both scenarios are examined through two independent lenses — each one can independently cause a trip:</text>
  <text x="32" y="460" font-size="11" font-weight="bold" fill="#3d7fbd">Lens 1 — Real Power &amp; Frequency: </text><text x="220" y="460" font-size="11" fill="#3a5270">turbine thermal capacity, rotational inertia, governor response rate, swing equation  (Screens S1-1 · S1-2 · S1-3)</text>
  <text x="32" y="476" font-size="11" font-weight="bold" fill="#cc3d00">Lens 2 — Reactive Power &amp; Voltage: </text><text x="228" y="476" font-size="11" fill="#6b3020">alternator reactive capability, AVR excitation speed, terminal voltage survival  (Screens S1-4 · S1-5)</text>

  <!-- BRANDING (text only - no external image reference) -->
  <text x="990" y="500" text-anchor="end" font-size="8" fill="#aaa">Kirby Industrial Resources</text>

</svg>