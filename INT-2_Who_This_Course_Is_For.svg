<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     viewBox="0 0 960 460" width="960" height="460"
     font-family="'Segoe UI', Arial, Helvetica, sans-serif">

  <!-- ── Background ── -->
  <rect width="960" height="460" fill="#f3f5f9"/>
  <rect x="0" y="0" width="960" height="5" fill="#1a3660"/>
  <rect x="0" y="455" width="960" height="5" fill="#1a3660"/>

  <!-- ── Title ── -->
  <text x="480" y="48" text-anchor="middle" font-size="26" font-weight="700" fill="#1a3660">Who This Course Is For</text>
  <line x1="320" y1="57" x2="640" y2="57" stroke="#3068b0" stroke-width="1.5" opacity="0.5"/>
  <text x="480" y="79" text-anchor="middle" font-size="13" fill="#555">
    A packaged GTG system combines three primary subsystems into a single, deliverable product.
  </text>

  <!-- ══════════════════════════════════════════════════════════════ -->
  <!--  COMPONENT BOXES                                               -->
  <!--  Layout: left margin 88px                                      -->
  <!--    Box 1 (x=88, w=145) | +gap(45) | Box 2 (x=278, w=145)      -->
  <!--    | +gap(45) | Box 3 (x=468, w=145) | =gap(45) |             -->
  <!--    Box 4 (x=658, w=215)  right margin 87px                     -->
  <!-- ══════════════════════════════════════════════════════════════ -->

  <!-- ─────────────── BOX 1 : Gas Turbine ─────────────── -->
  <!-- Card body -->
  <rect x="88" y="105" width="145" height="170" rx="10" fill="#1a3660" stroke="#0f2240" stroke-width="1.5"/>
  <!-- Header band (rounded top, flat bottom via overlay) -->
  <rect x="88" y="105" width="145" height="76" rx="10" fill="#2e5f9e"/>
  <rect x="88" y="160" width="145" height="21" fill="#2e5f9e"/>
  <!-- Icon: turbine shaft + hub + blades -->
  <line x1="98" y1="143" x2="223" y2="143" stroke="#80b8e8" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="160" cy="143" r="11" fill="#1a3660" stroke="#80b8e8" stroke-width="2"/>
  <circle cx="160" cy="143" r="3.5" fill="#80b8e8"/>
  <polygon points="154,119 166,119 163,133 157,133" fill="#80b8e8"/>
  <polygon points="154,165 166,165 163,153 157,153" fill="#5a9acc"/>
  <!-- Labels -->
  <text x="160" y="213" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">Gas Turbine</text>
  <text x="160" y="233" text-anchor="middle" font-size="11" fill="#a4c8e8">Prime Mover</text>
  <text x="160" y="254" text-anchor="middle" font-size="10" fill="#779ec0">Fuel  →  Shaft Power</text>

  <!-- ─── PLUS 1 (center x=256) ─── -->
  <text x="256" y="205" text-anchor="middle" font-size="44" font-weight="700" fill="#2e5f9e">+</text>

  <!-- ─────────────── BOX 2 : Alternator ─────────────── -->
  <rect x="278" y="105" width="145" height="170" rx="10" fill="#1a3660" stroke="#0f2240" stroke-width="1.5"/>
  <rect x="278" y="105" width="145" height="76" rx="10" fill="#2e5f9e"/>
  <rect x="278" y="160" width="145" height="21" fill="#2e5f9e"/>
  <!-- Icon: generator ring + AC wave -->
  <circle cx="350" cy="143" r="27" fill="#1a3660" stroke="#80b8e8" stroke-width="2"/>
  <path d="M325,143 Q330,129 336,143 Q342,157 348,143 Q354,129 360,143 Q366,157 372,143 Q376,136 375,143"
        fill="none" stroke="#80b8e8" stroke-width="2" stroke-linecap="round"/>
  <!-- Labels -->
  <text x="350" y="213" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">Alternator</text>
  <text x="350" y="233" text-anchor="middle" font-size="11" fill="#a4c8e8">Generator</text>
  <text x="350" y="254" text-anchor="middle" font-size="10" fill="#779ec0">Shaft Power  →  AC</text>

  <!-- ─── PLUS 2 (center x=446) ─── -->
  <text x="446" y="205" text-anchor="middle" font-size="44" font-weight="700" fill="#2e5f9e">+</text>

  <!-- ─────────────── BOX 3 : Auxiliary Systems ─────────────── -->
  <rect x="468" y="105" width="145" height="170" rx="10" fill="#1a3660" stroke="#0f2240" stroke-width="1.5"/>
  <rect x="468" y="105" width="145" height="76" rx="10" fill="#2e5f9e"/>
  <rect x="468" y="160" width="145" height="21" fill="#2e5f9e"/>
  <!-- Icon: instrument panel -->
  <rect x="499" y="110" width="82" height="53" rx="4" fill="#1a3660" stroke="#80b8e8" stroke-width="1.5"/>
  <rect x="504" y="115" width="22" height="15" rx="2" fill="#3878c0"/>
  <rect x="530" y="115" width="22" height="15" rx="2" fill="#3878c0"/>
  <rect x="556" y="115" width="20" height="15" rx="2" fill="#3878c0"/>
  <rect x="504" y="134" width="22" height="15" rx="2" fill="#285a90"/>
  <rect x="530" y="134" width="22" height="15" rx="2" fill="#285a90"/>
  <rect x="556" y="134" width="20" height="15" rx="2" fill="#285a90"/>
  <circle cx="515" cy="123" r="3" fill="#80b8e8"/>
  <circle cx="541" cy="123" r="3" fill="#80b8e8"/>
  <circle cx="566" cy="123" r="3" fill="#80b8e8"/>
  <!-- Labels (two lines for "Auxiliary Systems") -->
  <text x="540" y="208" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">Auxiliary</text>
  <text x="540" y="228" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">Systems</text>
  <text x="540" y="254" text-anchor="middle" font-size="10" fill="#779ec0">Fuel · Controls · Cooling</text>

  <!-- ─── EQUALS (center x=636) ─── -->
  <text x="636" y="208" text-anchor="middle" font-size="44" font-weight="700" fill="#bf4800">=</text>

  <!-- ─────────────── BOX 4 : Packaged GTG Product ─────────────── -->
  <!-- Slightly taller and wider to signal the outcome -->
  <rect x="658" y="88" width="215" height="200" rx="12" fill="#bf4800" stroke="#8a3200" stroke-width="2"/>
  <!-- Header band -->
  <rect x="658" y="88" width="215" height="85" rx="12" fill="#e05810"/>
  <rect x="658" y="145" width="215" height="28" fill="#e05810"/>
  <!-- Icon: dashed integration outline -->
  <rect x="676" y="100" width="180" height="60" rx="6" fill="none"
        stroke="rgba(255,255,255,0.45)" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="765" y="126" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.82)">Gas Turbine</text>
  <text x="765" y="145" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.82)">+ Alternator + Auxiliary</text>
  <!-- Labels -->
  <text x="765" y="213" text-anchor="middle" font-size="17" font-weight="700" fill="#ffffff">Packaged GTG</text>
  <text x="765" y="234" text-anchor="middle" font-size="17" font-weight="700" fill="#ffffff">Product</text>
  <text x="765" y="268" text-anchor="middle" font-size="10" fill="#ffd8b0">Grid-independent power system</text>

  <!-- ══════════════════════════════════════════════════════════════ -->
  <!--  BOTTOM CALLOUT BAR                                            -->
  <!-- ══════════════════════════════════════════════════════════════ -->
  <rect x="40" y="314" width="880" height="72" rx="8" fill="#dce7f5" stroke="#bed0e8" stroke-width="1"/>
  <!-- Left accent pip -->
  <rect x="40" y="314" width="5" height="72" rx="4" fill="#2e5f9e"/>
  <text x="480" y="340" text-anchor="middle" font-size="13" font-weight="600" fill="#1a3660">
    In island mode, the packaged GTG is the entire electrical grid — there is no utility connection.
  </text>
  <text x="480" y="364" text-anchor="middle" font-size="12" fill="#334">
    This course covers how all three subsystems must be specified, coordinated, and protected for island mode operation.
  </text>

  <!-- ══════════════════════════════════════════════════════════════ -->
  <!--  KIRBY BRANDING — subtle, bottom-right                        -->
  <!-- ══════════════════════════════════════════════════════════════ -->
  <image href="kirbyflag_imagefile.png" xlink:href="kirbyflag_imagefile.png"
         x="856" y="394" width="65" height="32"
         opacity="0.50" preserveAspectRatio="xMidYMid meet"/>
  <text x="857" y="437" font-size="9" fill="#bbb">Kirby Industrial Resources</text>

</svg>
